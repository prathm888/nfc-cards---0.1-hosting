services:
  - type: web
    name: samartha-nfc-backend
    env: python
    region: singapore # Change this if you prefer US or EU
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        sync: false
