{% extends 'base.html' %}
{% block title %}Sign In — NFC Hub{% endblock %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-surface-950 relative overflow-hidden">
  <!-- Background orbs -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-700/20 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-700/20 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-md mx-4">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-500 to-indigo-600 shadow-2xl shadow-purple-900/60 mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.14 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/></svg>
      </div>
      <h1 class="text-3xl font-bold text-white">NFC<span class="text-purple-400">Hub</span></h1>
      <p class="text-gray-400 mt-1 text-sm">Smart NFC Business Card Platform</p>
    </div>

    <!-- Card -->
    <div class="glass-card p-8">
      <h2 class="text-xl font-semibold text-white mb-6">Welcome back</h2>
      <form method="POST" action="{{ url_for('auth_login') }}" class="space-y-5" id="login-form">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username"
                 class="input-field" placeholder="Enter your username"/>
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
                 class="input-field" placeholder="••••••••"/>
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
            <input type="checkbox" name="remember" class="w-4 h-4 rounded border-gray-600 bg-surface-800 text-purple-500 focus:ring-purple-500"/>
            Remember me
          </label>
        </div>
        <button type="submit" id="login-btn" class="btn-primary w-full">
          Sign In
        </button>
      </form>
      <p class="text-center text-sm text-gray-400 mt-6">
        Don't have an account?
        <a href="{{ url_for('auth_register') }}" class="text-purple-400 hover:text-purple-300 font-medium transition-colors">Create one free</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
