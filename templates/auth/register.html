{% extends 'base.html' %}
{% block title %}Create Account — NFC Hub{% endblock %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-surface-950 relative overflow-hidden">
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-700/20 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-700/20 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-md mx-4 py-8">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-500 to-indigo-600 shadow-2xl shadow-purple-900/60 mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.14 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/></svg>
      </div>
      <h1 class="text-3xl font-bold text-white">NFC<span class="text-purple-400">Hub</span></h1>
      <p class="text-gray-400 mt-1 text-sm">Start managing smart NFC cards today</p>
    </div>

    <div class="glass-card p-8">
      <h2 class="text-xl font-semibold text-white mb-6">Create your account</h2>
      <form method="POST" action="{{ url_for('auth_register') }}" class="space-y-4" id="register-form">
        <div>
          <label for="business_name" class="block text-sm font-medium text-gray-300 mb-1.5">Business Name</label>
          <input type="text" id="business_name" name="business_name" class="input-field" placeholder="Acme Corp"/>
        </div>
        <div>
          <label for="username" class="block text-sm font-medium text-gray-300 mb-1.5">Username <span class="text-red-400">*</span></label>
          <input type="text" id="username" name="username" required autocomplete="username"
                 class="input-field" placeholder="johndoe"/>
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-1.5">Email <span class="text-red-400">*</span></label>
          <input type="email" id="email" name="email" required autocomplete="email"
                 class="input-field" placeholder="john@example.com"/>
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Password <span class="text-red-400">*</span></label>
          <input type="password" id="password" name="password" required autocomplete="new-password"
                 class="input-field" placeholder="Min 8 characters"/>
        </div>
        <button type="submit" id="register-btn" class="btn-primary w-full mt-2">
          Create Account
        </button>
      </form>
      <p class="text-center text-sm text-gray-400 mt-6">
        Already have an account?
        <a href="{{ url_for('auth_login') }}" class="text-purple-400 hover:text-purple-300 font-medium transition-colors">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
