<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Card Paused — NFC Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500:'#8b5cf6', 600:'#7c3aed' },
            surface: { 800:'#1e1b2e', 900:'#0f0d1a', 950:'#080612' }
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="bg-surface-950 text-gray-100 font-sans antialiased min-h-screen flex items-center justify-center">
  <div class="text-center px-6">
    <div class="w-20 h-20 rounded-3xl bg-amber-900/30 border border-amber-700/30 flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </div>
    <h1 class="text-3xl font-bold text-white mb-3">Card Paused</h1>
    <p class="text-gray-400 max-w-sm mx-auto text-sm leading-relaxed">
      This NFC card (<span class="font-mono text-amber-300">{{ card.unique_id }}</span>) has been temporarily paused by the administrator and is not currently active.
    </p>
    <p class="text-gray-600 text-xs mt-6">Please contact your administrator to reactivate.</p>
  </div>
</body>
</html>
